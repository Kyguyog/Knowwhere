<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Reports — KnowWhere</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --card: #111118;
      --border: #222230;
      --primary: #a855f7;
      --primary-dim: rgba(168,85,247,0.15);
      --secondary: #22d3ee;
      --danger: #ef4444;
      --success: #22c55e;
      --text: #e2e8f0;
      --muted: #64748b;
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

    /* Auth wall */
    #auth-wall { position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:1rem; }
    #auth-wall.hidden { display:none; }
    #main-content { display:none; }
    #main-content.visible { display:block; }

    /* === NAV === */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px;
    }
    .nav-logo {
      font-family: var(--font-display); font-weight: 900; font-size: 1rem;
      letter-spacing: 0.05em; color: var(--text); text-decoration: none;
    }
    .nav-logo span { color: var(--primary); }
    .nav-back {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--muted); font-size: 0.75rem; font-weight: 600;
      text-decoration: none; transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }

    /* === TAB BAR === */
    .tab-bar {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .tab-btn {
      padding: 0.85rem 1.75rem; border: none; background: transparent;
      color: var(--muted); cursor: pointer; font-family: var(--font-display);
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s; margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* === PANELS === */
    .panel { display: none; }
    .panel.active { display: block; }

    /* === LIST PANEL === */
    .wrap { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
    }
    .page-title {
      font-family: var(--font-display); font-size: 1.3rem;
      font-weight: 900; letter-spacing: 0.05em;
    }
    .page-title span { color: var(--primary); }
    .page-subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }

    /* Toolbar: filters + search */
    .toolbar {
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .filter-tabs {
      display: flex; gap: 0.3rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.2rem;
    }
    .filter-tab {
      padding: 0.35rem 0.85rem; border-radius: 5px; border: none;
      background: transparent; color: var(--muted); cursor: pointer;
      font-family: var(--font-display); font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }
    .filter-tab.active { background: var(--primary-dim); color: var(--primary); }

    .search-wrap {
      flex: 1; min-width: 180px; max-width: 320px; position: relative;
    }
    .search-wrap svg {
      position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search-input {
      width: 100%; background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.5rem 0.8rem 0.5rem 2.2rem; font-size: 0.8rem;
      font-family: var(--font-body); outline: none; transition: border-color 0.2s;
    }
    #search-input:focus { border-color: rgba(168,85,247,0.5); }
    #search-input::placeholder { color: var(--muted); }

    /* Report cards */
    .reports-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .report-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.25rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.75rem;
      transition: border-color 0.2s;
    }
    .report-card.resolved { opacity: 0.6; }
    .report-card:hover { border-color: rgba(168,85,247,0.3); }

    .report-top {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.5rem;
    }
    .report-meta { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .report-user {
      font-family: var(--font-display); font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.05em; color: var(--text);
    }
    .report-date { font-size: 0.72rem; color: var(--muted); }

    .severity-pill {
      display: inline-flex; align-items: center;
      padding: 0.18rem 0.55rem; border-radius: 999px;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .sev-low     { background:rgba(34,197,94,0.12); color:#22c55e; border:1px solid rgba(34,197,94,0.35); }
    .sev-medium  { background:rgba(251,191,36,0.12); color:#fbbf24; border:1px solid rgba(251,191,36,0.35); }
    .sev-high    { background:rgba(249,115,22,0.12); color:#f97316; border:1px solid rgba(249,115,22,0.35); }
    .sev-critical{ background:rgba(239,68,68,0.12); color:var(--danger); border:1px solid rgba(239,68,68,0.35); }

    .status-pill {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.2rem 0.65rem; border-radius: 999px;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .status-open     { background:rgba(239,68,68,0.12); color:var(--danger); border:1px solid rgba(239,68,68,0.3); }
    .status-resolved { background:rgba(34,197,94,0.12); color:var(--success); border:1px solid rgba(34,197,94,0.3); }

    .report-page {
      font-size: 0.72rem; color: var(--secondary); font-family: monospace;
      background: rgba(34,211,238,0.07); border-radius: 4px; padding: 0.1rem 0.45rem;
    }
    .report-details {
      font-size: 0.875rem; color: rgba(226,232,240,0.85);
      line-height: 1.6; white-space: pre-wrap; word-break: break-word;
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.75rem 1rem;
    }
    .resolve-btn {
      padding: 0.3rem 0.85rem; border-radius: 6px; border: none;
      font-family: var(--font-display); font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: background 0.15s;
    }
    .resolve-btn.mark-resolved {
      background: rgba(34,197,94,0.12); color: var(--success); border: 1px solid rgba(34,197,94,0.35);
    }
    .resolve-btn.mark-resolved:hover { background: rgba(34,197,94,0.22); }
    .resolve-btn.mark-open {
      background: rgba(100,116,139,0.12); color: var(--muted); border: 1px solid rgba(100,116,139,0.3);
    }
    .resolve-btn.mark-open:hover { background: rgba(100,116,139,0.22); }
    .delete-btn {
      padding: 0.3rem 0.85rem; border-radius: 6px;
      font-family: var(--font-display); font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      background: rgba(239,68,68,0.1); color: var(--danger);
      border: 1px solid rgba(239,68,68,0.3);
      transition: background 0.15s;
    }
    .delete-btn:hover { background: rgba(239,68,68,0.22); }
    .delete-confirm {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.28);
      border-radius: 8px; padding: 0.28rem 0.6rem;
    }
    .delete-confirm span { font-size: 0.65rem; color: var(--danger); font-weight: 600; }
    .delete-confirm button {
      padding: 0.2rem 0.6rem; border-radius: 5px; border: none; cursor: pointer;
      font-family: var(--font-display); font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase; transition: background 0.15s;
    }
    .delete-confirm .confirm-yes {
      background: rgba(239,68,68,0.2); color: var(--danger); border: 1px solid rgba(239,68,68,0.4);
    }
    .delete-confirm .confirm-yes:hover { background: rgba(239,68,68,0.35); }
    .delete-confirm .confirm-no {
      background: rgba(100,116,139,0.1); color: var(--muted); border: 1px solid rgba(100,116,139,0.3);
    }
    .delete-confirm .confirm-no:hover { background: rgba(100,116,139,0.2); }

    /* User agent display */
    .ua-display {
      font-size: 0.68rem; color: var(--muted);
      display: inline-flex; align-items: center; gap: 0.35rem; cursor: pointer;
      transition: color 0.15s;
    }
    .ua-display:hover { color: var(--text); }
    .ua-friendly {
      font-weight: 600; letter-spacing: 0.03em;
    }
    .ua-raw {
      font-family: monospace; font-size: 0.62rem; opacity: 0.7;
      word-break: break-all; display: none;
    }
    .ua-display.expanded .ua-friendly { display: none; }
    .ua-display.expanded .ua-raw { display: inline; }

    .empty-state {
      text-align: center; padding: 4rem 2rem;
      color: var(--muted); font-size: 0.875rem;
    }
    .empty-state svg { opacity: 0.25; margin-bottom: 1rem; }

    .loading-state {
      text-align: center; padding: 3rem;
      color: var(--muted); font-size: 0.875rem;
    }
    .spinner {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid rgba(168,85,247,0.2); border-top-color: var(--primary);
      animation: spin 0.75s linear infinite; margin: 0 auto 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === REPORT FORM PANEL === */
    .form-wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    .form-title {
      font-family: var(--font-display); font-size: 1.2rem;
      font-weight: 900; letter-spacing: 0.05em; margin-bottom: 0.35rem;
    }
    .form-title span { color: var(--primary); }
    .form-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.75rem; }

    .form-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem 1.75rem;
      display: flex; flex-direction: column; gap: 1.1rem;
    }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted);
    }
    .field input, .field textarea, .field select {
      background: #0d0d14; color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.65rem 0.85rem; font-size: 0.875rem;
      font-family: var(--font-body); outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: rgba(168,85,247,0.5);
    }
    .field textarea { min-height: 140px; resize: vertical; }
    .field select option { background: #111118; }

    .submit-btn {
      align-self: flex-start;
      padding: 0.65rem 1.5rem; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: var(--font-display); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .form-msg { font-size: 0.85rem; }

    /* Auth box */
    .auth-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 0 60px rgba(168,85,247,0.12); text-align: center;
    }
    .auth-box h2 { font-family: var(--font-display); font-size: 1rem; margin-bottom: 0.75rem; }
    .auth-box p { color: var(--muted); font-size: 0.875rem; }
    .auth-box a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>

<div id="auth-wall">
  <div class="auth-box">
    <h2>KNOW<span style="color:var(--primary)">WHERE</span></h2>
    <p>You need to be signed in to access bug reports.<br><br>
    <a href="index.html">← Return to Home</a></p>
  </div>
</div>

<div id="main-content">
  <nav>
    <a class="nav-logo" href="index.html">KNOW<span>WHERE</span></a>
    <a class="nav-back" href="index.html">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      Back to Home
    </a>
  </nav>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('list')">View Reports</button>
    <button class="tab-btn" onclick="switchTab('report')">Report a Bug</button>
  </div>

  <!-- === LIST PANEL === -->
  <div id="panel-list" class="panel active">
    <div class="wrap">
      <div class="page-header">
        <div>
          <div class="page-title">Bug <span>Reports</span></div>
          <div class="page-subtitle" id="page-subtitle">Loading…</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">All</button>
          <button class="filter-tab" data-filter="open" onclick="setFilter('open')">Unresolved</button>
          <button class="filter-tab" data-filter="resolved" onclick="setFilter('resolved')">Resolved</button>
        </div>
        <div class="search-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search-input" placeholder="Search reports…" oninput="renderReports()" />
        </div>
      </div>

      <div id="reports-container" class="reports-list">
        <div class="loading-state"><div class="spinner"></div>Loading reports…</div>
      </div>
    </div>
  </div>

  <!-- === REPORT PANEL === -->
  <div id="panel-report" class="panel">
    <div class="form-wrap">
      <div class="form-title">Report a <span>Bug</span></div>
      <div class="form-sub">Found something broken? Let the admins know.</div>

      <div class="form-card">
        <div class="field">
          <label>Page or Game</label>
          <input id="bug-page" placeholder="index.html / Time Shooter / etc" />
        </div>
        <div class="field">
          <label>Severity</label>
          <select id="bug-severity">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
            <option>Critical</option>
          </select>
        </div>
        <div class="field">
          <label>What happened?</label>
          <textarea id="bug-details" placeholder="Describe steps to reproduce and what you expected."></textarea>
        </div>
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
          <button class="submit-btn" id="send-btn">Submit Bug Report</button>
          <div class="form-msg" id="form-msg"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js';
  import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, addDoc, serverTimestamp, getDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAP-GnPXo490Frl1hGYWbje8QdhxtD19PQ",
    authDomain: "knowwhere1.firebaseapp.com",
    projectId: "knowwhere1",
    storageBucket: "knowwhere1.firebasestorage.app",
    messagingSenderId: "747448090609",
    appId: "1:747448090609:web:e3af5b2c8ffa8fb3a9ce50",
    measurementId: "G-DV44FGDQ2N"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let isAdmin = false;
  let allReports = [];
  let currentFilter = 'all';
  let unsubscribe = null;

  // ── Helpers ────────────────────────────────────────────────────────────────

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function severityClass(sev) {
    return { Low:'sev-low', Medium:'sev-medium', High:'sev-high', Critical:'sev-critical' }[sev] || 'sev-low';
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  /**
   * Parse a raw user-agent string into a friendly OS/platform label.
   * Returns null if the OS cannot be determined.
   */
  function parseUA(ua) {
    if (!ua) return null;
    if (/CrOS/i.test(ua))                     return 'ChromeOS';
    if (/Windows NT/i.test(ua))               return 'Windows';
    if (/iPhone|iPad|iPod/i.test(ua))         return 'iOS';
    if (/Android/i.test(ua))                  return 'Android';
    if (/Macintosh|Mac OS X/i.test(ua))       return 'macOS';
    if (/Linux/i.test(ua))                    return 'Linux';
    if (/FreeBSD|OpenBSD|NetBSD/i.test(ua))   return 'BSD';
    return null;
  }

  function uaIcon(friendly) {
    const icons = {
      'Windows':  '🪟',
      'macOS':    '🍎',
      'iOS':      '📱',
      'Android':  '🤖',
      'ChromeOS': '🌐',
      'Linux':    '🐧',
      'BSD':      '😈',
    };
    return icons[friendly] || '💻';
  }

  function buildUAHtml(rawUA) {
    if (!rawUA) return '';
    const friendly = parseUA(rawUA);
    const label = friendly
      ? `<span class="ua-friendly">${uaIcon(friendly)} ${esc(friendly)}</span>`
      : `<span class="ua-friendly">Unknown — click to view</span>`;
    return `
      <span class="ua-display" onclick="this.classList.toggle('expanded')" title="Click to toggle full user agent">
        ${label}
        <span class="ua-raw">${esc(rawUA)}</span>
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </span>`;
  }

  // ── Tab switching ───────────────────────────────────────────────────────────

  window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'list') || (i === 1 && tab === 'report'));
    });
    document.getElementById('panel-list').classList.toggle('active', tab === 'list');
    document.getElementById('panel-report').classList.toggle('active', tab === 'report');
  };

  // ── Filter + search ─────────────────────────────────────────────────────────

  window.setFilter = function(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    renderReports();
  };

  // ── Render ──────────────────────────────────────────────────────────────────

  window.renderReports = function() {
    const container = document.getElementById('reports-container');
    const searchTerm = (document.getElementById('search-input')?.value || '').trim().toLowerCase();

    let filtered = allReports;
    if (currentFilter === 'open')     filtered = filtered.filter(r => r.status !== 'resolved');
    if (currentFilter === 'resolved') filtered = filtered.filter(r => r.status === 'resolved');

    if (searchTerm) {
      filtered = filtered.filter(r =>
        (r.details || '').toLowerCase().includes(searchTerm) ||
        (r.page    || '').toLowerCase().includes(searchTerm) ||
        (r.email   || '').toLowerCase().includes(searchTerm) ||
        (r.severity|| '').toLowerCase().includes(searchTerm)
      );
    }

    if (filtered.length === 0) {
      const msg = searchTerm
        ? `No reports match "${esc(searchTerm)}".`
        : currentFilter === 'all' ? 'No bug reports yet.'
        : currentFilter === 'open' ? 'No unresolved reports.'
        : 'No resolved reports.';
      container.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M8 2h8l2 4v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6l2-4z"/>
            <path d="M9 10h6"/><path d="M9 14h4"/>
          </svg>
          <p>${msg}</p>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map(r => {
      const resolved = r.status === 'resolved';
      return `
        <div class="report-card ${resolved ? 'resolved' : ''}">
          <div class="report-top">
            <div class="report-meta">
              ${isAdmin ? `<span class="report-user">${esc(r.email)}</span>` : ''}
              <span class="severity-pill ${severityClass(r.severity)}">${esc(r.severity)}</span>
              ${r.page ? `<span class="report-page">${esc(r.page)}</span>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <span class="status-pill ${resolved ? 'status-resolved' : 'status-open'}">
                ${resolved ? '✓ Resolved' : '● Unresolved'}
              </span>
              ${isAdmin ? `
                <button class="resolve-btn ${resolved ? 'mark-open' : 'mark-resolved'}"
                  onclick="toggleStatus('${esc(r.id)}', ${resolved})">
                  ${resolved ? 'Re-open' : 'Mark Resolved'}
                </button>
                ${resolved ? `
                <span class="delete-confirm" id="del-confirm-${esc(r.id)}" style="display:none;">
                  <span>Delete?</span>
                  <button class="confirm-yes" onclick="deleteReport('${esc(r.id)}')">Yes, delete</button>
                  <button class="confirm-no" onclick="cancelDelete('${esc(r.id)}')">Cancel</button>
                </span>
                <button class="delete-btn" id="del-btn-${esc(r.id)}" onclick="promptDelete('${esc(r.id)}')">
                  Delete
                </button>` : ''}` : ''}
            </div>
          </div>

          <div class="report-details">${esc(r.details)}</div>

          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.4rem;">
            <span class="report-date">${formatDate(r.createdAt)}</span>
            ${isAdmin && r.userAgent ? buildUAHtml(r.userAgent) : ''}
          </div>
        </div>`;
    }).join('');
  };

  // ── Toggle status (admin only) ──────────────────────────────────────────────

  window.toggleStatus = async function(reportId, currentlyResolved) {
    if (!isAdmin) return;
    try {
      await updateDoc(doc(db, 'bugReports', reportId), {
        status: currentlyResolved ? 'open' : 'resolved'
      });
    } catch (e) {
      alert('Failed to update status: ' + e.message);
    }
  };

  window.promptDelete = function(reportId) {
    document.getElementById('del-btn-' + reportId).style.display = 'none';
    document.getElementById('del-confirm-' + reportId).style.display = 'inline-flex';
  };

  window.cancelDelete = function(reportId) {
    document.getElementById('del-confirm-' + reportId).style.display = 'none';
    document.getElementById('del-btn-' + reportId).style.display = '';
  };

  window.deleteReport = async function(reportId) {
    if (!isAdmin) return;
    try {
      await deleteDoc(doc(db, 'bugReports', reportId));
      // onSnapshot will re-render automatically
    } catch (e) {
      alert('Failed to delete: ' + e.message);
    }
  };

  // ── Load reports ────────────────────────────────────────────────────────────

  function loadReports() {
    if (unsubscribe) unsubscribe();
    // Everyone can now see all reports; admins can change status
    const q = query(collection(db, 'bugReports'), orderBy('createdAtServer', 'desc'));

    unsubscribe = onSnapshot(q, snap => {
      allReports = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const subtitle = document.getElementById('page-subtitle');
      subtitle.textContent = `${allReports.length} total · ${allReports.filter(r => r.status !== 'resolved').length} unresolved`;
      renderReports();
    }, err => {
      console.error('Failed to load reports:', err);
      document.getElementById('reports-container').innerHTML =
        `<div class="empty-state"><p style="color:var(--danger)">Failed to load: ${esc(err.message)}</p></div>`;
    });
  }

  // ── Submit bug report ───────────────────────────────────────────────────────

  document.getElementById('send-btn').addEventListener('click', async () => {
    const msgEl = document.getElementById('form-msg');
    const btn   = document.getElementById('send-btn');
    if (!currentUser) {
      msgEl.textContent = 'Please sign in first.';
      msgEl.style.color = 'var(--danger)';
      return;
    }
    const page    = document.getElementById('bug-page').value.trim();
    const details = document.getElementById('bug-details').value.trim();
    const severity = document.getElementById('bug-severity').value;
    if (!details) {
      msgEl.textContent = 'Please describe the issue.';
      msgEl.style.color = 'var(--danger)';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Sending…';
    try {
      await addDoc(collection(db, 'bugReports'), {
        email: currentUser.email,
        page,
        severity,
        details,
        status: 'open',
        createdAt: new Date().toISOString(),
        createdAtServer: serverTimestamp(),
        userAgent: navigator.userAgent
      });
      msgEl.textContent = '✓ Bug report submitted. Thank you!';
      msgEl.style.color = 'var(--success)';
      document.getElementById('bug-details').value = '';
      document.getElementById('bug-page').value = '';
      // Switch back to list after short delay
      setTimeout(() => switchTab('list'), 1200);
    } catch (e) {
      msgEl.textContent = 'Failed: ' + (e.message || 'unknown error');
      msgEl.style.color = 'var(--danger)';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Submit Bug Report';
    }
  });

  // ── Admin check ─────────────────────────────────────────────────────────────

  async function checkAdmin(email) {
    try {
      const snap = await getDoc(doc(db, 'users', email));
      return snap.exists() && snap.data().admin === true;
    } catch { return false; }
  }

  // ── Auth state ──────────────────────────────────────────────────────────────

  onAuthStateChanged(auth, async user => {
    if (!user) {
      document.getElementById('auth-wall').classList.remove('hidden');
      document.getElementById('main-content').classList.remove('visible');
      return;
    }
    currentUser = user;
    isAdmin = await checkAdmin(user.email);
    document.getElementById('auth-wall').classList.add('hidden');
    document.getElementById('main-content').classList.add('visible');
    loadReports();
  });
</script>
</body>
</html>
