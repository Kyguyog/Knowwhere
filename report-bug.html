<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Bug</title>
  <style>
    body{font-family:Inter,system-ui,sans-serif;background:#0a0a0f;color:#e2e8f0;margin:0;padding:2rem;}
    .wrap{max-width:760px;margin:0 auto;background:#111118;border:1px solid #222230;border-radius:12px;padding:1.2rem;}
    h1{margin:0 0 1rem;font-size:1.25rem}
    label{display:block;font-size:.75rem;color:#94a3b8;margin:.75rem 0 .35rem}
    input,textarea,select{width:100%;background:#0d0d14;color:#e2e8f0;border:1px solid #222230;border-radius:8px;padding:.65rem .8rem}
    textarea{min-height:140px;resize:vertical}
    button{margin-top:1rem;background:#a855f7;color:#fff;border:0;border-radius:8px;padding:.7rem 1rem;cursor:pointer}
    .msg{margin-top:.8rem;font-size:.85rem}
    a{color:#22d3ee}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Report a Bug</h1>
    <p style="color:#94a3b8;font-size:.9rem;">Signed-in users can submit bug reports directly to admins.</p>
    <label>Page</label>
    <input id="page" placeholder="index.html / msg.html / etc" />
    <label>Severity</label>
    <select id="severity">
      <option>Low</option><option>Medium</option><option>High</option><option>Critical</option>
    </select>
    <label>What happened?</label>
    <textarea id="details" placeholder="Describe steps to reproduce and what you expected."></textarea>
    <button id="send">Submit Bug Report</button>
    <div class="msg" id="msg"></div>
    <p style="margin-top:1rem;"><a href="index.html">← Back to Home</a></p>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js';
    import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

    const firebaseConfig={apiKey:"AIzaSyAP-GnPXo490Frl1hGYWbje8QdhxtD19PQ",authDomain:"knowwhere1.firebaseapp.com",projectId:"knowwhere1",storageBucket:"knowwhere1.firebasestorage.app",messagingSenderId:"747448090609",appId:"1:747448090609:web:e3af5b2c8ffa8fb3a9ce50",measurementId:"G-DV44FGDQ2N"};
    const app=initializeApp(firebaseConfig);
    const auth=getAuth(app);
    const db=getFirestore(app);

    let user=null;
    const msgEl=document.getElementById('msg');
    onAuthStateChanged(auth,(u)=>{
      user=u;
      if(!u){ msgEl.textContent='You must be signed in first.'; msgEl.style.color='#ef4444'; }
    });

    document.getElementById('send').addEventListener('click', async ()=>{
      if(!user){ msgEl.textContent='Please sign in on the main site first.'; msgEl.style.color='#ef4444'; return; }
      const page=document.getElementById('page').value.trim();
      const details=document.getElementById('details').value.trim();
      const severity=document.getElementById('severity').value;
      if(!details){ msgEl.textContent='Please add details.'; msgEl.style.color='#ef4444'; return; }
      try{
        await addDoc(collection(db,'bugReports'),{
          email:user.email,
          page,
          severity,
          details,
          status:'open',
          createdAt: new Date().toISOString(),
          createdAtServer: serverTimestamp(),
          userAgent:navigator.userAgent
        });
        msgEl.textContent='Bug report sent. Thank you.';
        msgEl.style.color='#22c55e';
        document.getElementById('details').value='';
      }catch(e){
        msgEl.textContent='Failed to send: '+(e.message||'unknown error');
        msgEl.style.color='#ef4444';
      }
    });
  </script>
</body>
</html>
